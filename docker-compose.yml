version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: studysphere_user
      POSTGRES_PASSWORD: studysphere_password
      POSTGRES_DB: studysphere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data:

